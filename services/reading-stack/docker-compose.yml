services:
    kavita:
        image: jvmilazz0/kavita:latest
        container_name: kavita
        restart: unless-stopped
        ports:
            - "5002:5000"
        volumes:
            - /opt/docker-data/reading-stack/kavita:/kavita/config
            # Map the MergerFS flattened view to Kavita's manga library
            - /opt/docker-data/reading-stack/media/manga_flat:/manga
            - /opt/docker-data/reading-stack/media/comics:/comics
            - /opt/docker-data/reading-stack/media/books:/books
        environment:
            - TZ=Etc/UTC

    suwayomi:
        image: ghcr.io/suwayomi/tachidesk
        container_name: suwayomi
        restart: unless-stopped
        ports:
            - "8085:4567"
        volumes:
            - /opt/docker-data/reading-stack/suwayomi:/home/suwayomi/.local/share/Tachidesk
            # Map the root downloads directory to the host
            - /opt/docker-data/reading-stack/media/manga:/home/suwayomi/.local/share/Tachidesk/downloads
        environment:
            - TZ=Etc/UTC
            - FLARESOLVERR_ENABLED=true
            - FLARESOLVERR_URL=http://flaresolverr:8191
            - TACHIDESK_SERVER_DOWNLOADASCBZ=true
        networks:
            - default
            - flaresolverr-net

networks:
    flaresolverr-net:
        external: true
