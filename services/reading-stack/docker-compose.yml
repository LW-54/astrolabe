services:
    kavita:
        image: jvmilazz0/kavita:latest
        container_name: kavita
        restart: unless-stopped
        ports:
            - "5002:5000"
        volumes:
            - /opt/docker-data/reading-stack/kavita:/kavita/config
            # Map the specific subdirectories
            - /opt/docker-data/reading-stack/media/manga:/manga
            - /opt/docker-data/reading-stack/media/comics:/comics
            - /opt/docker-data/reading-stack/media/books:/books
        environment:
            - TZ=Etc/UTC

    suwayomi:
        image: ghcr.io/suwayomi/tachidesk
        container_name: suwayomi
        restart: unless-stopped
        ports:
            - "8085:4567"
        volumes:
            - /opt/docker-data/reading-stack/suwayomi:/home/suwayomi/.local/share/Tachidesk
            # Map the internal downloads/mangas folder to the external media/manga folder
            # This isolates system files (thumbnails) from actual manga.
            - /opt/docker-data/reading-stack/media/manga:/home/suwayomi/.local/share/Tachidesk/downloads/mangas
        environment:
            - TZ=Etc/UTC
            - FLARESOLVERR_ENABLED=true
            - FLARESOLVERR_URL=http://flaresolverr:8191
            # "Gold Standard" organization: removes the Source folder layer
            # so Kavita sees individual Manga titles as Series.
            - TACHIDESK_SERVER_DOWNLOADPATHTEMPLATE={manga_title}/{chapter_title}
            - TACHIDESK_SERVER_DOWNLOADASCBZ=true
        networks:
            - default
            - flaresolverr-net

    komf:
        image: sndxr/komf:latest
        container_name: komf
        restart: unless-stopped
        ports:
            - "8086:8085"
        volumes:
            - /opt/docker-data/reading-stack/komf:/config
            - /run/secrets/reading-stack/kavita_api_key:/run/secrets/kavita_api_key:ro
        environment:
            - TZ=Etc/UTC
            - KOMF_KAVITA_BASE_URI=http://kavita:5000
            - KOMF_KAVITA_API_KEY_FILE=/run/secrets/kavita_api_key
            - KOMF_KAVITA_EVENT_LISTENER_ENABLED=true
            - KOMF_KAVITA_METADATA_UPDATE_MODES=API
            # Enable Metadata Providers
            - KOMF_METADATA_PROVIDERS_DEFAULT_PROVIDERS_MANGA_UPDATES_ENABLED=true
            - KOMF_METADATA_PROVIDERS_DEFAULT_PROVIDERS_ANI_LIST_ENABLED=true
            - KOMF_METADATA_PROVIDERS_DEFAULT_PROVIDERS_MAL_ENABLED=true
            - KOMF_METADATA_PROVIDERS_DEFAULT_PROVIDERS_NAUTILJON_ENABLED=true
        depends_on:
            - kavita

networks:
    flaresolverr-net:
        external: true
