services:
  kamiyomu:
    image: marcoscostadev/kamiyomu:latest
    container_name: kamiyomu
    restart: unless-stopped
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /opt/docker-data/kamiyomu/manga:/manga
      - /opt/docker-data/kamiyomu/db:/db
      - /opt/docker-data/kamiyomu/agents:/agents
      - /opt/docker-data/kamiyomu/logs:/logs
    environment:
      - TZ=Etc/UTC
