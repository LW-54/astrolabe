services:
    seerr:
        image: ghcr.io/seerr-team/seerr:latest
        container_name: seerr
        restart: unless-stopped
        ports:
            - "5055:5055"
        volumes:
            - /opt/docker-data/seerr/config:/app/config

    seerrbridge:
        image: ghcr.io/woahai321/seerrbridge:latest
        container_name: seerrbridge
        restart: unless-stopped
        ports:
            # Corrected port for the Nuxt frontend
            - "3777:3777"
        volumes:
            - /opt/docker-data/seerr/bridge-data:/app/data
        depends_on:
            - seerr
