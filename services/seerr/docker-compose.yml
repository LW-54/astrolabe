services:
    seerr:
        image: ghcr.io/seerr-team/seerr:latest
        container_name: seerr
        restart: unless-stopped
        ports:
            - "5055:5055"
        volumes:
            - /opt/docker-data/seerr/config:/app/config

    seerrbridge:
        image: ghcr.io/woahai321/seerrbridge:latest
        container_name: seerrbridge
        restart: unless-stopped
        ports:
            - "3777:3777" # Frontend
            - "8777:8777" # Backend API
            - "8778:8778" # Setup Wizard API
        volumes:
            - /opt/docker-data/seerr/bridge-data:/app/data
            - /opt/docker-data/seerr/bridge-logs:/app/logs
            - /opt/docker-data/seerr/bridge-db:/var/lib/mysql
        depends_on:
            - seerr
