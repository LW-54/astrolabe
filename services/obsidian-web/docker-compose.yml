services:
    obsidian:
        image: lscr.io/linuxserver/obsidian:latest
        container_name: obsidian-web
        restart: unless-stopped
        environment:
            - PUID=1000
            - PGID=100
            - TZ=Etc/UTC
            - CUSTOM_RES_W=1920
            - CUSTOM_RES_H=1080
            - LC_ALL=en_US.UTF-8
        volumes:
            - /opt/docker-data/obsidian-web/config:/config
            - /home/lw/obsidian:/vault
        ports:
            - "7211:3000"
