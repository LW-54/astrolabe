services:
    obsidian:
        image: lscr.io/linuxserver/obsidian:latest
        container_name: obsidian-web
        restart: unless-stopped
        environment:
            - PUID=1000
            - PGID=100
            - TZ=Etc/UTC
            - LC_ALL=en_US.UTF-8
            - DR_FIXED_DPI=96
        shm_size: "1gb"
        volumes:
            - /opt/docker-data/obsidian-web/config:/config
            - /home/lw/obsidian:/vault
        ports:
            - "7211:3000"
