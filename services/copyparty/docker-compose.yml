services:
    copyparty:
        image: copyparty/ac:latest
        container_name: copyparty
        restart: unless-stopped
        environment:
            # We map this container to the same UID/GID as the `lw` user on the host
            - PUID=1000
            - PGID=100
        volumes:
            - /opt/docker-data/copyparty/config:/cfg
            - /home/lw:/home/lw
        ports:
            - "3923:3923"
        working_dir: /var/empty
        command:
            - "-e2d" # Disable CORS checks (safe behind Caddy)
            - "-e2t" # Trust reverse-proxy headers (fixes HTTPS detection)
