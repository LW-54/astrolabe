services:
    copyparty:
        image: copyparty/ac:latest
        container_name: copyparty
        restart: unless-stopped
        environment:
            - PUID=1000
            - PGID=100
            # Global Copyparty Settings via ENV
            - PRTY_NO_CORS=1
            - PRTY_RPROXY=-1
        volumes:
            # Mount the users.txt file securely generated by Nix
            - /opt/docker-data/copyparty/config/users.txt:/cfg/users.txt:ro
            # Mount the main workspace and restrict it to 'admin' using volume flags
            - /home/lw:/w:a=admin
        ports:
            - "3923:3923"
        command:
            # Tell copyparty to use the users.txt file for authentication
            - "-a"
            - "@/cfg/users.txt"
