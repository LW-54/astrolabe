services:
    copyparty:
        image: copyit/copyparty:latest
        container_name: copyparty
        restart: unless-stopped
        environment:
            # We map this container to the same UID/GID as the `lw` user on the host
            - PUID=1000
            - PGID=100
        volumes:
            - /opt/docker-data/copyparty/config:/cfg
            - /home/lw:/home/lw
        ports:
            - "3923:3923"
        command:
            # -p 3923: Run on this port inside the container
            # -v /home/lw::A: Tells Copyparty to serve /home/lw at the root of the site, requiring Admin (A) access
            # -a @/cfg/users.txt: Tells Copyparty to read users and passwords from this file
            - "-p"
            - "3923"
            - "-v"
            - "/home/lw::A"
            - "-a"
            - "@/cfg/users.txt"
